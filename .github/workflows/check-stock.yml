name: Vérifier le stock PortaSplit

on:
  workflow_dispatch:
    inputs:
      test_notification:
        description: "Envoyer une notification de test"
        required: false
        default: false
        type: boolean
  schedule:
  - cron: "3,8,13,18,23,28,33,38,43,48,53,58 * * * *"

concurrency:
  group: portasplit-stock-check
  cancel-in-progress: false

jobs:
  check-stock:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Récupérer les fichiers
        uses: actions/checkout@v4

      - name: Restaurer l’état précédent
        uses: actions/cache/restore@v4
        with:
          path: state.json
          key: portasplit-state-${{ github.run_id }}
          restore-keys: |
            portasplit-state-

      - name: Créer l’état initial si nécessaire
        run: |
          if [ ! -f state.json ]; then
            echo "{}" > state.json
          fi

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Installer les dépendances
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Vérifier les boutiques
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          NTFY_SERVER: https://ntfy.sh
          TEST_NOTIFICATION: ${{ inputs.test_notification || 'false' }}
        run: python monitor.py

      - name: Sauvegarder le nouvel état
        if: always()
        uses: actions/cache/save@v4
        with:
          path: state.json
          key: portasplit-state-${{ github.run_id }}

      - name: Conserver le diagnostic
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: portasplit-results-${{ github.run_number }}
          path: |
            latest-results.json
            state.json
          retention-days: 3
          if-no-files-found: ignore
